<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- tailwind + daisy -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<!-- icons -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav class="border-b px-6 py-4 space-y-4">

   
    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">

        <div class="flex items-center gap-2">
            <img src="./assets/github-logo.png" class="w-8">
            <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
        </div>

      
        <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
            <input 
            id="search-input"
            type="text"
            placeholder="Search issues"
            class="border px-3 py-2 rounded-md w-full sm:w-60">
            <button onclick="searchIssues()" class="btn btn-primary px-3 py-1 rounded">
                <i class="fa-solid fa-plus"></i>
                New Issue
            </button>
        </div>

    </div>

  
    <div class="flex flex-wrap gap-3">
        <button onclick="filterIssues('all'); toggleStyle(id)" id="all-filter-btn" class="btn btn-outline px-8 py-4 bg-blue-800 text-white rounded">
            All
        </button>

        <button onclick="filterIssues('open'); toggleStyle(id)" id="open-filter-btn" class="btn btn-outline bg-white text-gray-500">
            Open
        </button>

        <button onclick="filterIssues('closed'); toggleStyle(id)" id="closed-filter-btn" class="btn btn-outline bg-white text-gray-500">
            Closed
        </button>
    </div>

</nav>


<section>
  <div class="p-4">
    <div class="flex items-center gap-4 justify-between w-full">

      <!-- icon -->
      <div class="w-10 h-10 flex items-center justify-center">
        <img src="./assets/Aperture.png" alt="issues">
      </div>

      <!-- text -->
      <div>
        <h2 id="issues-counter" class="text-lg font-semibold text-gray-800">
          50 Issues
        </h2>
        <p class="text-sm text-gray-500">
          Track and manage your project issues
        </p>
      </div>

      
      <div class="flex items-center gap-4 ml-auto">
        <div class="flex items-center gap-2">
          <i class="fa-solid fa-circle text-green-700"></i>
          <p>Open</p>
        </div>

        <div class="flex items-center gap-2">
          <i class="fa-solid fa-circle text-purple-500"></i>
          <p>Closed</p>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- all card container -->
<div id="issues-container"
class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
</div>

<!-- modal -->
<div id="issue-modal" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center z-50">

  <div class="bg-white w-[90%] p-6 rounded-xl shadow-lg">

    <!-- Header -->
    <div class="flex justify-between items-center  pb-3">
      <h2 id="modal-title" class="text-xl font-semibold"></h2>
      <button onclick="closeModal()" class="btn btn-primary text-white-600 text-xl">Close</button>
    </div>

    <!-- Info Section -->
    <div class="mt-4 space-y-3">

      <div class="flex gap-3">
        <span class="font-semibold"></span>
        <p id="modal-status"></p>
      </div>

      <div class="flex gap-3">
        <span class="font-semibold"></span>
        <p id="modal-date"></p>
      </div>

      <div>
        <span class="font-semibold"></span>
        <div id="modal-labels" class="flex gap-2 mt-1 flex-wrap"></div>
      </div>

      <div>
        <span class="font-semibold"></span>
        <p id="modal-description" class="text-gray-600 mt-1"></p>
      </div>


      <div class="flex justify-between">
        <span class="font-semibold">Assignee:</span>
        <div id="modal-assignee" class="flex gap-2 mt-1 flex-wrap"></div>
        
      <div>
        <span class="font-semibold"></span>
        <p id="modal-priority"></p>
      </div>
      </div>

    </div>

  </div>

</div>


<script src="./main.js"></script>
</body>
</html>
