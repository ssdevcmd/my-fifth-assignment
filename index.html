<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
</head>
<body>
    
<!-- tailwind + daisy -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<!-- icons -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>
    *{
        font-family:  "Geist", sans-serif;
    }
</style>


</head>
<body>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white w-[400px] p-8 rounded-xl shadow-md text-center">

    <!-- Logo -->
    <img src="./assets/github-logo.png" class="w-16 mx-auto mb-4">

    <!-- Title -->
    <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>

    <p class="text-sm text-gray-500 mb-6">
      Sign in to manage your issues
    </p>

    <!-- Username -->
    <div class="text-left mb-4">
      <label class="text-sm">Username</label>
      <input id="username" type="text"
      placeholder="Enter Username"
      class="w-full border rounded-md p-2 mt-1">
      <p class="text-xs text-purple-500 mt-3">Default: admin</p>
    </div>

    <!-- Password -->
    <div class="text-left mb-4">
      <label class="text-sm">Password</label>
      <input id="password" type="password"
      placeholder="Enter Password"
      class="w-full border rounded-md p-2 mt-1">
      <p class="text-xs text-purple-500 mt-3">Default: admin123</p>
    </div>

    <!-- Button -->
    <button onclick="login()" class="btn btn-primary w-full">Sign In
    </button>

    <!-- Divider -->
    <p class="my-4">OR</p>

    <!-- Demo credentials -->
    <div class="bg-gray-100 p-3 rounded-md text-sm">
      <p class="text-gray-500 mb-6">Demo Credentials:</p>
      <p><span class="text-bold text-black">Username:</span> admin</p>
      <p><span class="text-bold text-black">Password:</span> admin123</p>
    </div>

  </div>

 

</body>
</html>
